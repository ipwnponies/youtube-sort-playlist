[project]
name = "youtube-sort-playlist"
version = "0.0.0"
requires-python = "~=3.9"
dependencies = [
    "addict",
    "arrow",
    "google-api-python-client",
    "isodate",
    "oauth2client",
    "pyyaml",
    "tqdm",
    "xdg",
]

[dependency-groups]
dev = [
    "ipython",
    "mypy",
    "pre-commit",
    "pudb",
    "pylint",
    "ruff",
    "requirements-tools",
]

[tool.ruff]
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "W"]

[tool.black]
line-length=120
target-version = ['py37']
skip-string-normalization = true
include = '\.pyi?$'
exclude = '''
(
  /(
      \.eggs         # exclude a few common directories in the
    | \.git          # root of the project
    | \.mypy_cache
    | \.tox
    | venv
    | build
    | dist
  )/
  | foo.py           # also separately exclude a file named foo.py in
                     # the root of the project
)
'''

[tool.mypy]
ignore_missing_imports = true
